<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <rect width="400" height="300" rx="12" fill="#ECFDF5"/>
  <!-- Title -->
  <text x="200" y="35" font-family="sans-serif" font-size="14" font-weight="bold" fill="#374151" text-anchor="middle">Water Resource Management</text>
  <!-- Large water droplet -->
  <path d="M200,60 Q200,60 240,140 Q260,180 260,200 A60,60 0 1,1 140,200 Q140,180 160,140 Q200,60 200,60 Z" fill="#0EA5E9" opacity="0.8"/>
  <!-- Droplet highlight -->
  <ellipse cx="175" cy="160" rx="12" ry="20" fill="#FFFFFF" opacity="0.3" transform="rotate(-15 175 160)"/>
  <!-- Inner water symbol -->
  <path d="M200,120 Q200,120 218,160 Q225,175 225,185 A25,25 0 1,1 175,185 Q175,175 182,160 Q200,120 200,120 Z" fill="#0284C7" opacity="0.5"/>
  <!-- Waves at bottom of droplet -->
  <path d="M155,210 Q170,200 185,210 Q200,220 215,210 Q230,200 245,210" stroke="#FFFFFF" stroke-width="2" fill="none" opacity="0.5"/>
  <path d="M160,222 Q175,212 190,222 Q205,232 220,222 Q235,212 240,222" stroke="#FFFFFF" stroke-width="1.5" fill="none" opacity="0.4"/>
  <!-- Water waves below droplet -->
  <path d="M100,262 Q130,250 160,262 Q190,274 220,262 Q250,250 280,262 Q310,274 340,262" stroke="#0EA5E9" stroke-width="2.5" fill="none" opacity="0.5"/>
  <path d="M80,275 Q115,264 150,275 Q185,286 220,275 Q255,264 290,275 Q325,286 360,275" stroke="#0EA5E9" stroke-width="2" fill="none" opacity="0.35"/>
  <!-- Small droplets (splashing) -->
  <path d="M100,180 Q100,170 105,175 A5,5 0 1,1 95,175 Q100,170 100,180 Z" fill="#0EA5E9" opacity="0.4"/>
  <path d="M300,170 Q300,162 304,166 A4,4 0 1,1 296,166 Q300,162 300,170 Z" fill="#0EA5E9" opacity="0.4"/>
  <path d="M320,200 Q320,194 323,197 A3,3 0 1,1 317,197 Q320,194 320,200 Z" fill="#0EA5E9" opacity="0.3"/>
  <path d="M80,200 Q80,194 83,197 A3,3 0 1,1 77,197 Q80,194 80,200 Z" fill="#0EA5E9" opacity="0.3"/>
  <!-- Bottom label -->
  <text x="200" y="290" font-family="sans-serif" font-size="11" fill="#6B7280" text-anchor="middle">Sustainable Water Stewardship</text>
</svg>