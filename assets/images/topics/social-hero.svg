  <circle cx="200" cy="133" r="9" fill="#F5F3FF"/>
  <path d="M184 155 Q200 165 216 155" stroke="#F5F3FF" stroke-width="2.5" fill="none"/>
  <!-- Person 3 - right -->
  <circle cx="600" cy="145" r="22" fill="#7C3AED"/>
  <circle cx="600" cy="133" r="9" fill="#F5F3FF"/>
  <path d="M584 155 Q600 165 616 155" stroke="#F5F3FF" stroke-width="2.5" fill="none"/>
  <!-- Person 4 - bottom left -->
  <circle cx="300" cy="248" r="22" fill="#A78BFA"/>
