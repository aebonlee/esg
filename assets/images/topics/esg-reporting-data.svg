<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <rect width="400" height="300" rx="12" fill="#ECFEFF"/>
  <!-- Database cylinder -->
  <ellipse cx="165" cy="90" rx="55" ry="18" fill="#0891B2"/>
  <rect x="110" y="90" width="110" height="100" fill="#0891B2"/>
  <ellipse cx="165" cy="190" rx="55" ry="18" fill="#065F6B"/>
  <!-- Database horizontal lines (tiers) -->
  <ellipse cx="165" cy="120" rx="55" ry="14" fill="none" stroke="#ECFEFF" stroke-width="1.5" opacity="0.5"/>
  <ellipse cx="165" cy="155" rx="55" ry="14" fill="none" stroke="#ECFEFF" stroke-width="1.5" opacity="0.5"/>
  <!-- Database top highlight -->
  <ellipse cx="165" cy="90" rx="45" ry="10" fill="none" stroke="white" stroke-width="1" opacity="0.3"/>
  <!-- Data rows on database -->
  <rect x="130" y="100" width="30" height="5" rx="2" fill="white" opacity="0.4"/>
  <rect x="165" y="100" width="20" height="5" rx="2" fill="white" opacity="0.3"/>
  <rect x="130" y="132" width="25" height="5" rx="2" fill="white" opacity="0.4"/>
  <rect x="160" y="132" width="30" height="5" rx="2" fill="white" opacity="0.3"/>
  <rect x="130" y="167" width="35" height="5" rx="2" fill="white" opacity="0.4"/>
  <rect x="170" y="167" width="18" height="5" rx="2" fill="white" opacity="0.3"/>
  <!-- Magnifying glass -->
  <circle cx="285" cy="145" r="45" fill="none" stroke="#0891B2" stroke-width="5"/>
  <line x1="317" y1="178" x2="345" y2="210" stroke="#0891B2" stroke-width="6" stroke-linecap="round"/>
  <!-- Glass highlight -->
  <circle cx="285" cy="145" r="38" fill="#0891B2" opacity="0.08"/>
  <!-- Search result inside glass -->
  <rect x="268" y="130" width="35" height="5" rx="2" fill="#0891B2" opacity="0.5"/>
  <rect x="268" y="140" width="28" height="5" rx="2" fill="#0891B2" opacity="0.4"/>
  <rect x="268" y="150" width="32" height="5" rx="2" fill="#0891B2" opacity="0.3"/>
  <!-- Connection line -->
  <line x1="220" y1="140" x2="240" y2="143" stroke="#0891B2" stroke-width="1.5" stroke-dasharray="5,4" opacity="0.5"/>
  <!-- Small data points floating -->
  <circle cx="240" cy="80" r="4" fill="#0891B2" opacity="0.3"/>
  <circle cx="260" cy="100" r="3" fill="#0891B2" opacity="0.25"/>
  <circle cx="235" cy="200" r="4" fill="#0891B2" opacity="0.2"/>
  <!-- Label -->
  <text x="200" y="265" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#0891B2" opacity="0.6">ESG Data Analysis</text>
</svg>