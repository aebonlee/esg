<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <rect width="400" height="300" rx="12" fill="#F5F3FF"/>
  <!-- Hard hat -->
  <path d="M140 140 Q140 80 200 70 Q260 80 260 140 Z" fill="#8B5CF6"/>
  <rect x="130" y="135" width="140" height="16" rx="4" fill="#7C3AED"/>
  <!-- Hat brim highlight -->
  <rect x="140" y="138" width="120" height="4" rx="2" fill="#A78BFA"/>
  <!-- Hat top line -->
  <line x1="200" y1="75" x2="200" y2="105" stroke="#A78BFA" stroke-width="2"/>
  <!-- Checkmark circle -->
  <circle cx="260" cy="100" r="28" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="2"/>
  <path d="M247 100 L256 109 L274 91" stroke="#8B5CF6" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Person silhouette below hat -->
  <rect x="175" y="155" width="50" height="45" rx="8" fill="#DDD6FE"/>
  <!-- Safety stars -->
  <circle cx="120" cy="200" r="4" fill="#C4B5FD"/>
  <circle cx="280" cy="200" r="4" fill="#C4B5FD"/>
  <circle cx="100" cy="120" r="3" fill="#EDE9FE"/>
  <circle cx="300" cy="120" r="3" fill="#EDE9FE"/>
  <!-- Label -->
  <text x="200" y="260" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="bold" fill="#8B5CF6">Workplace Safety</text>
</svg>