<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" fill="none">
  <rect width="800" height="400" rx="16" fill="#EFF6FF"/>
  <!-- Building base -->
  <rect x="200" y="260" width="400" height="20" rx="3" fill="#2563EB"/>
  <!-- Building pediment (triangle) -->
  <polygon points="190,120 400,50 610,120" fill="#3B82F6"/>
  <rect x="200" y="115" width="400" height="12" rx="2" fill="#2563EB"/>
  <!-- Column 1 -->
  <rect x="240" y="127" width="28" height="133" rx="4" fill="#60A5FA"/>
  <rect x="236" y="127" width="36" height="10" rx="2" fill="#3B82F6"/>
  <rect x="236" y="253" width="36" height="10" rx="2" fill="#3B82F6"/>
  <!-- Column 2 -->
  <rect x="330" y="127" width="28" height="133" rx="4" fill="#60A5FA"/>
  <rect x="326" y="127" width="36" height="10" rx="2" fill="#3B82F6"/>
  <rect x="326" y="253" width="36" height="10" rx="2" fill="#3B82F6"/>
  <!-- Column 3 -->
  <rect x="440" y="127" width="28" height="133" rx="4" fill="#60A5FA"/>
  <rect x="436" y="127" width="36" height="10" rx="2" fill="#3B82F6"/>
  <rect x="436" y="253" width="36" height="10" rx="2" fill="#3B82F6"/>
  <!-- Column 4 -->
  <rect x="530" y="127" width="28" height="133" rx="4" fill="#60A5FA"/>
  <rect x="526" y="127" width="36" height="10" rx="2" fill="#3B82F6"/>
  <rect x="526" y="253" width="36" height="10" rx="2" fill="#3B82F6"/>
  <!-- Scales of justice centered -->
  <line x1="400" y1="155" x2="400" y2="215" stroke="#1D4ED8" stroke-width="3"/>
  <line x1="360" y1="185" x2="440" y2="185" stroke="#1D4ED8" stroke-width="3"/>
  <!-- Left pan -->
  <line x1="360" y1="185" x2="345" y2="210" stroke="#1D4ED8" stroke-width="2"/>
  <line x1="360" y1="185" x2="375" y2="210" stroke="#1D4ED8" stroke-width="2"/>
  <path d="M340 210 Q360 225 380 210" stroke="#1D4ED8" stroke-width="2.5" fill="#BFDBFE"/>
  <!-- Right pan -->
  <line x1="440" y1="185" x2="425" y2="210" stroke="#1D4ED8" stroke-width="2"/>
  <line x1="440" y1="185" x2="455" y2="210" stroke="#1D4ED8" stroke-width="2"/>
  <path d="M420 210 Q440 225 460 210" stroke="#1D4ED8" stroke-width="2.5" fill="#BFDBFE"/>
  <!-- Scale top -->
  <circle cx="400" cy="155" r="5" fill="#1D4ED8"/>
  <!-- Steps -->
  <rect x="250" y="280" width="300" height="8" rx="2" fill="#93C5FD"/>
  <rect x="280" y="288" width="240" height="8" rx="2" fill="#BFDBFE"/>
  <!-- Decorative elements -->
  <circle cx="120" cy="180" r="8" fill="#DBEAFE"/>
  <circle cx="680" cy="180" r="8" fill="#DBEAFE"/>
  <circle cx="100" cy="250" r="5" fill="#BFDBFE"/>
  <circle cx="700" cy="250" r="5" fill="#BFDBFE"/>
  <!-- Title -->
  <text x="400" y="360" text-anchor="middle" font-family="sans-serif" font-size="28" font-weight="bold" fill="#2563EB">Governance</text>
</svg>