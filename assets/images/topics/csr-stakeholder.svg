<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <rect width="400" height="300" rx="12" fill="#FFFBEB"/>
  <!-- Central circle -->
  <circle cx="200" cy="140" r="36" fill="#D97706"/>
  <text x="200" y="136" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#FFFBEB">Company</text>
  <text x="200" y="150" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#FFFBEB">Core</text>
  <!-- Connecting lines -->
  <line x1="200" y1="104" x2="200" y2="52" stroke="#D97706" stroke-width="2" opacity="0.5"/>
  <line x1="233" y1="114" x2="285" y2="75" stroke="#D97706" stroke-width="2" opacity="0.5"/>
  <line x1="236" y1="140" x2="300" y2="140" stroke="#D97706" stroke-width="2" opacity="0.5"/>
  <line x1="233" y1="166" x2="285" y2="205" stroke="#D97706" stroke-width="2" opacity="0.5"/>
  <line x1="200" y1="176" x2="200" y2="228" stroke="#D97706" stroke-width="2" opacity="0.5"/>
  <line x1="167" y1="166" x2="115" y2="205" stroke="#D97706" stroke-width="2" opacity="0.5"/>
  <line x1="164" y1="140" x2="100" y2="140" stroke="#D97706" stroke-width="2" opacity="0.5"/>
  <line x1="167" y1="114" x2="115" y2="75" stroke="#D97706" stroke-width="2" opacity="0.5"/>
  <!-- Stakeholder nodes -->
  <!-- Top -->
  <circle cx="200" cy="42" r="22" fill="#FBBF24"/>
  <text x="200" y="46" text-anchor="middle" font-family="sans-serif" font-size="9" font-weight="bold" fill="#78350F">Customers</text>
  <!-- Top right -->
  <circle cx="295" cy="68" r="22" fill="#FBBF24"/>
  <text x="295" y="72" text-anchor="middle" font-family="sans-serif" font-size="9" font-weight="bold" fill="#78350F">Investors</text>
  <!-- Right -->
  <circle cx="310" cy="140" r="22" fill="#FBBF24"/>
  <text x="310" y="144" text-anchor="middle" font-family="sans-serif" font-size="9" font-weight="bold" fill="#78350F">Suppliers</text>
  <!-- Bottom right -->
  <circle cx="295" cy="212" r="22" fill="#FBBF24"/>
  <text x="295" y="216" text-anchor="middle" font-family="sans-serif" font-size="9" font-weight="bold" fill="#78350F">Gov</text>
  <!-- Bottom -->
  <circle cx="200" cy="238" r="22" fill="#FBBF24"/>
  <text x="200" y="242" text-anchor="middle" font-family="sans-serif" font-size="9" font-weight="bold" fill="#78350F">Community</text>
  <!-- Bottom left -->
  <circle cx="105" cy="212" r="22" fill="#FBBF24"/>
  <text x="105" y="216" text-anchor="middle" font-family="sans-serif" font-size="9" font-weight="bold" fill="#78350F">NGOs</text>
  <!-- Left -->
  <circle cx="90" cy="140" r="22" fill="#FBBF24"/>
  <text x="90" y="144" text-anchor="middle" font-family="sans-serif" font-size="9" font-weight="bold" fill="#78350F">Employees</text>
  <!-- Top left -->
  <circle cx="105" cy="68" r="22" fill="#FBBF24"/>
  <text x="105" y="72" text-anchor="middle" font-family="sans-serif" font-size="9" font-weight="bold" fill="#78350F">Media</text>
  <!-- Title -->
  <text x="200" y="286" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="bold" fill="#D97706">Stakeholder Map</text>
</svg>