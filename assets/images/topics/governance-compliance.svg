  <circle cx="300" cy="85" r="30" fill="#2563EB"/>
  <path d="M285 85 L296 96 L318 72" stroke="#EFF6FF" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Small decorative elements -->
  <circle cx="80" cy="120" r="5" fill="#BFDBFE"/>
  <circle cx="345" cy="180" r="5" fill="#BFDBFE"/>
  <rect x="330" y="140" width="12" height="3" rx="1.5" fill="#DBEAFE"/>
  <rect x="330" y="148" width="8" height="3" rx="1.5" fill="#DBEAFE"/>
  <!-- Label -->
  <text x="200" y="272" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="bold" fill="#2563EB">Compliance</text>
