  <!-- Item 1 - checked -->
  <rect x="145" y="95" width="18" height="18" rx="3" fill="#2563EB"/>
  <path d="M149 104 L153 108 L160 100" stroke="#EFF6FF" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="172" y="100" width="85" height="6" rx="3" fill="#93C5FD"/>
  <!-- Item 2 - checked -->
  <rect x="145" y="125" width="18" height="18" rx="3" fill="#2563EB"/>
  <path d="M149 134 L153 138 L160 130" stroke="#EFF6FF" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="172" y="130" width="70" height="6" rx="3" fill="#93C5FD"/>
  <!-- Item 3 - checked -->
  <rect x="145" y="155" width="18" height="18" rx="3" fill="#2563EB"/>
  <path d="M149 164 L153 168 L160 160" stroke="#EFF6FF" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="172" y="160" width="80" height="6" rx="3" fill="#93C5FD"/>
  <!-- Item 4 - checked -->
  <rect x="145" y="185" width="18" height="18" rx="3" fill="#2563EB"/>
