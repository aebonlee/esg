<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <rect width="400" height="300" rx="12" fill="#F0FDF4"/>
  <!-- Three overlapping circles for E, S, G -->
  <circle cx="160" cy="130" r="70" fill="#059669" opacity="0.25" stroke="#059669" stroke-width="2"/>
  <circle cx="240" cy="130" r="70" fill="#0284C7" opacity="0.25" stroke="#0284C7" stroke-width="2"/>
  <circle cx="200" cy="200" r="70" fill="#7C3AED" opacity="0.25" stroke="#7C3AED" stroke-width="2"/>
  <!-- Connecting lines between centers -->
  <line x1="160" y1="130" x2="240" y2="130" stroke="#374151" stroke-width="1.5" stroke-dasharray="4 3"/>
  <line x1="240" y1="130" x2="200" y2="200" stroke="#374151" stroke-width="1.5" stroke-dasharray="4 3"/>
  <line x1="200" y1="200" x2="160" y2="130" stroke="#374151" stroke-width="1.5" stroke-dasharray="4 3"/>
  <!-- Labels -->
  <text x="135" y="115" font-family="sans-serif" font-size="28" font-weight="bold" fill="#059669" text-anchor="middle">E</text>
  <text x="265" y="115" font-family="sans-serif" font-size="28" font-weight="bold" fill="#0284C7" text-anchor="middle">S</text>
  <text x="200" y="230" font-family="sans-serif" font-size="28" font-weight="bold" fill="#7C3AED" text-anchor="middle">G</text>
  <!-- Sub-labels -->
  <text x="115" y="138" font-family="sans-serif" font-size="10" fill="#059669" text-anchor="middle">Environmental</text>
  <text x="285" y="138" font-family="sans-serif" font-size="10" fill="#0284C7" text-anchor="middle">Social</text>
  <text x="200" y="250" font-family="sans-serif" font-size="10" fill="#7C3AED" text-anchor="middle">Governance</text>
  <!-- Center label -->
  <text x="200" y="160" font-family="sans-serif" font-size="11" font-weight="bold" fill="#374151" text-anchor="middle">ESG</text>
  <!-- Title -->
  <text x="200" y="285" font-family="sans-serif" font-size="13" fill="#6B7280" text-anchor="middle">ESG Concept Overview</text>
</svg>