<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <rect width="400" height="300" rx="12" fill="#ECFDF5"/>
  <!-- Title -->
  <text x="200" y="35" font-family="sans-serif" font-size="14" font-weight="bold" fill="#374151" text-anchor="middle">Green Technology</text>
  <!-- Circuit board background pattern -->
  <!-- Horizontal traces -->
  <line x1="40" y1="100" x2="130" y2="100" stroke="#10B981" stroke-width="2" opacity="0.3"/>
  <line x1="270" y1="100" x2="360" y2="100" stroke="#10B981" stroke-width="2" opacity="0.3"/>
  <line x1="40" y1="200" x2="130" y2="200" stroke="#10B981" stroke-width="2" opacity="0.3"/>
  <line x1="270" y1="200" x2="360" y2="200" stroke="#10B981" stroke-width="2" opacity="0.3"/>
  <!-- Vertical traces -->
  <line x1="100" y1="60" x2="100" y2="120" stroke="#10B981" stroke-width="2" opacity="0.3"/>
  <line x1="300" y1="60" x2="300" y2="120" stroke="#10B981" stroke-width="2" opacity="0.3"/>
  <line x1="100" y1="180" x2="100" y2="260" stroke="#10B981" stroke-width="2" opacity="0.3"/>
  <line x1="300" y1="180" x2="300" y2="260" stroke="#10B981" stroke-width="2" opacity="0.3"/>
  <!-- Diagonal traces to center -->
  <line x1="130" y1="100" x2="160" y2="130" stroke="#10B981" stroke-width="2" opacity="0.4"/>
  <line x1="270" y1="100" x2="240" y2="130" stroke="#10B981" stroke-width="2" opacity="0.4"/>
  <line x1="130" y1="200" x2="160" y2="170" stroke="#10B981" stroke-width="2" opacity="0.4"/>
  <line x1="270" y1="200" x2="240" y2="170" stroke="#10B981" stroke-width="2" opacity="0.4"/>
  <!-- Circuit nodes (dots) -->
  <circle cx="100" cy="100" r="4" fill="#10B981" opacity="0.5"/>
  <circle cx="300" cy="100" r="4" fill="#10B981" opacity="0.5"/>
  <circle cx="100" cy="200" r="4" fill="#10B981" opacity="0.5"/>
  <circle cx="300" cy="200" r="4" fill="#10B981" opacity="0.5"/>
  <circle cx="130" cy="100" r="3" fill="#10B981" opacity="0.4"/>
  <circle cx="270" cy="100" r="3" fill="#10B981" opacity="0.4"/>
  <circle cx="130" cy="200" r="3" fill="#10B981" opacity="0.4"/>
  <circle cx="270" cy="200" r="3" fill="#10B981" opacity="0.4"/>
  <!-- Outer nodes -->
  <circle cx="40" cy="100" r="3" fill="#10B981" opacity="0.3"/>
  <circle cx="360" cy="100" r="3" fill="#10B981" opacity="0.3"/>
  <circle cx="40" cy="200" r="3" fill="#10B981" opacity="0.3"/>
  <circle cx="360" cy="200" r="3" fill="#10B981" opacity="0.3"/>
  <circle cx="100" cy="60" r="3" fill="#10B981" opacity="0.3"/>
  <circle cx="300" cy="60" r="3" fill="#10B981" opacity="0.3"/>
  <circle cx="100" cy="260" r="3" fill="#10B981" opacity="0.3"/>
  <circle cx="300" cy="260" r="3" fill="#10B981" opacity="0.3"/>
  <!-- Central chip / processor -->
  <rect x="160" y="120" width="80" height="60" rx="6" fill="#059669" stroke="#047857" stroke-width="2"/>
  <!-- Chip pins (left) -->
  <line x1="150" y1="135" x2="160" y2="135" stroke="#047857" stroke-width="2"/>
  <line x1="150" y1="150" x2="160" y2="150" stroke="#047857" stroke-width="2"/>
  <line x1="150" y1="165" x2="160" y2="165" stroke="#047857" stroke-width="2"/>
  <!-- Chip pins (right) -->
  <line x1="240" y1="135" x2="250" y2="135" stroke="#047857" stroke-width="2"/>
  <line x1="240" y1="150" x2="250" y2="150" stroke="#047857" stroke-width="2"/>
  <line x1="240" y1="165" x2="250" y2="165" stroke="#047857" stroke-width="2"/>
  <!-- Chip pins (top) -->
  <line x1="180" y1="110" x2="180" y2="120" stroke="#047857" stroke-width="2"/>
  <line x1="200" y1="110" x2="200" y2="120" stroke="#047857" stroke-width="2"/>
  <line x1="220" y1="110" x2="220" y2="120" stroke="#047857" stroke-width="2"/>
  <!-- Chip pins (bottom) -->
  <line x1="180" y1="180" x2="180" y2="190" stroke="#047857" stroke-width="2"/>
  <line x1="200" y1="180" x2="200" y2="190" stroke="#047857" stroke-width="2"/>
  <line x1="220" y1="180" x2="220" y2="190" stroke="#047857" stroke-width="2"/>
  <!-- Leaf on the chip -->
  <path d="M190,140 Q200,128 215,135 Q210,148 200,155 Q195,145 190,140 Z" fill="#34D399"/>
  <line x1="200" y1="155" x2="205" y2="138" stroke="#ECFDF5" stroke-width="1"/>
  <line x1="203" y1="143" x2="196" y2="140" stroke="#ECFDF5" stroke-width="0.8"/>
  <line x1="204" y1="148" x2="198" y2="146" stroke="#ECFDF5" stroke-width="0.8"/>
  <!-- Bottom label -->
  <text x="200" y="282" font-family="sans-serif" font-size="11" fill="#6B7280" text-anchor="middle">Technology for Sustainability</text>
</svg>