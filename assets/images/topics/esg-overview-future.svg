<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <rect width="400" height="300" rx="12" fill="#F0FDF4"/>
  <!-- Title -->
  <text x="200" y="35" font-family="sans-serif" font-size="14" font-weight="bold" fill="#374151" text-anchor="middle">Future of ESG</text>
  <!-- Upward arrow (large, behind rocket) -->
  <line x1="200" y1="260" x2="200" y2="80" stroke="#059669" stroke-width="3" opacity="0.3"/>
  <polygon points="200,65 185,90 215,90" fill="#059669" opacity="0.3"/>
  <!-- Rocket body -->
  <rect x="182" y="120" width="36" height="80" rx="6" fill="#059669"/>
  <!-- Rocket nose cone -->
  <polygon points="200,90 182,130 218,130" fill="#047857"/>
  <!-- Rocket window -->
  <circle cx="200" cy="150" r="10" fill="#FFFFFF"/>
  <circle cx="200" cy="150" r="7" fill="#A7F3D0"/>
  <!-- Rocket fins -->
  <polygon points="182,185 165,210 182,200" fill="#047857"/>
  <polygon points="218,185 235,210 218,200" fill="#047857"/>
  <!-- Rocket exhaust -->
  <polygon points="190,200 200,230 210,200" fill="#F59E0B" opacity="0.8"/>
  <polygon points="193,200 200,220 207,200" fill="#EF4444" opacity="0.6"/>
  <!-- Stars -->
  <polygon points="90,80 93,90 103,90 95,96 98,106 90,100 82,106 85,96 77,90 87,90" fill="#059669" opacity="0.5"/>
  <polygon points="310,100 312,107 320,107 314,112 316,119 310,114 304,119 306,112 300,107 308,107" fill="#059669" opacity="0.4"/>
  <polygon points="120,140 122,145 128,145 123,149 125,154 120,150 115,154 117,149 112,145 118,145" fill="#059669" opacity="0.3"/>
  <polygon points="280,70 282,75 288,75 283,79 285,84 280,80 275,84 277,79 272,75 278,75" fill="#059669" opacity="0.6"/>
  <polygon points="330,180 332,185 338,185 333,189 335,194 330,190 325,194 327,189 322,185 328,185" fill="#059669" opacity="0.35"/>
  <polygon points="70,190 72,195 78,195 73,199 75,204 70,200 65,204 67,199 62,195 68,195" fill="#059669" opacity="0.45"/>
  <!-- Trailing dots from rocket -->
  <circle cx="200" cy="240" r="4" fill="#F59E0B" opacity="0.5"/>
  <circle cx="200" cy="252" r="3" fill="#F59E0B" opacity="0.3"/>
  <circle cx="200" cy="262" r="2" fill="#F59E0B" opacity="0.2"/>
  <!-- Bottom label -->
  <text x="200" y="285" font-family="sans-serif" font-size="11" fill="#6B7280" text-anchor="middle">Accelerating ESG Transformation</text>
</svg>