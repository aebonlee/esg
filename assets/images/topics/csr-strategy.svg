<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <rect width="400" height="300" rx="12" fill="#FFFBEB"/>
  <!-- Bullseye target -->
  <circle cx="190" cy="155" r="100" fill="#D97706" opacity="0.2"/>
  <circle cx="190" cy="155" r="75" fill="#D97706" opacity="0.35"/>
  <circle cx="190" cy="155" r="50" fill="#D97706" opacity="0.55"/>
  <circle cx="190" cy="155" r="25" fill="#D97706"/>
  <!-- Arrow -->
  <line x1="310" y1="65" x2="200" y2="148" stroke="#B45309" stroke-width="5" stroke-linecap="round"/>
  <!-- Arrowhead -->
  <polygon points="195,152 210,135 220,148" fill="#B45309"/>
  <!-- Arrow tail feathers -->
  <line x1="310" y1="65" x2="325" y2="55" stroke="#B45309" stroke-width="3" stroke-linecap="round"/>
  <line x1="310" y1="65" x2="320" y2="45" stroke="#B45309" stroke-width="3" stroke-linecap="round"/>
  <line x1="310" y1="65" x2="330" y2="65" stroke="#B45309" stroke-width="3" stroke-linecap="round"/>
  <!-- Bullseye center dot -->
  <circle cx="190" cy="155" r="6" fill="#FFFBEB"/>
  <!-- Title -->
  <text x="200" y="280" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#D97706">CSR Strategy</text>
</svg>