<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <rect width="400" height="300" rx="12" fill="#ECFDF5"/>
  <!-- Title -->
  <text x="200" y="35" font-family="sans-serif" font-size="14" font-weight="bold" fill="#374151" text-anchor="middle">Circular Economy</text>
  <!-- Circular arrows (recycle symbol - three curved arrows) -->
  <!-- Arrow 1: top, going clockwise to right -->
  <path d="M200,80 A80,80 0 0,1 269,200" stroke="#10B981" stroke-width="10" fill="none" stroke-linecap="round"/>
  <polygon points="275,195 265,215 285,210" fill="#10B981"/>
  <!-- Arrow 2: bottom-right, going clockwise to left -->
  <path d="M269,200 A80,80 0 0,1 131,200" stroke="#059669" stroke-width="10" fill="none" stroke-linecap="round"/>
  <polygon points="126,195 136,215 116,210" fill="#059669"/>
  <!-- Arrow 3: bottom-left, going clockwise to top -->
  <path d="M131,200 A80,80 0 0,1 200,80" stroke="#047857" stroke-width="10" fill="none" stroke-linecap="round"/>
  <polygon points="200,74 190,94 210,94" fill="#047857"/>
  <!-- Center text -->
  <text x="200" y="155" font-family="sans-serif" font-size="14" font-weight="bold" fill="#10B981" text-anchor="middle">Reduce</text>
  <text x="200" y="172" font-family="sans-serif" font-size="14" font-weight="bold" fill="#059669" text-anchor="middle">Reuse</text>
  <text x="200" y="189" font-family="sans-serif" font-size="14" font-weight="bold" fill="#047857" text-anchor="middle">Recycle</text>
  <!-- Labels around the circle -->
  <text x="260" y="100" font-family="sans-serif" font-size="10" fill="#10B981">Production</text>
  <text x="270" y="230" font-family="sans-serif" font-size="10" fill="#059669">Consumption</text>
  <text x="80" y="230" font-family="sans-serif" font-size="10" fill="#047857" text-anchor="end">Recovery</text>
  <!-- Bottom label -->
  <text x="200" y="280" font-family="sans-serif" font-size="11" fill="#6B7280" text-anchor="middle">Zero Waste Economy Model</text>
</svg>