<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <rect width="400" height="300" rx="12" fill="#EFF6FF"/>
  <!-- Warning triangle -->
  <path d="M200 55 L290 200 L110 200 Z" fill="#DBEAFE" stroke="#2563EB" stroke-width="3" stroke-linejoin="round"/>
  <!-- Inner triangle highlight -->
  <path d="M200 80 L270 190 L130 190 Z" fill="#EFF6FF"/>
  <!-- Exclamation mark -->
  <rect x="195" y="110" width="10" height="45" rx="4" fill="#2563EB"/>
  <circle cx="200" cy="172" r="6" fill="#2563EB"/>
  <!-- Shield behind/beside triangle -->
  <path d="M300 75 L350 95 L350 155 Q350 195 300 215 Q250 195 250 155 L250 95 Z" fill="#DBEAFE" stroke="#2563EB" stroke-width="2"/>
  <!-- Shield checkmark -->
  <path d="M280 140 L295 155 L325 120" stroke="#2563EB" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Small alert indicators -->
  <circle cx="80" cy="100" r="6" fill="#93C5FD"/>
  <line x1="80" y1="96" x2="80" y2="102" stroke="#EFF6FF" stroke-width="2"/>
  <circle cx="80" cy="105" r="1" fill="#EFF6FF"/>
  <circle cx="340" cy="240" r="6" fill="#93C5FD"/>
  <!-- Decorative elements -->
  <rect x="60" y="170" width="30" height="3" rx="1.5" fill="#BFDBFE"/>
  <rect x="60" y="178" width="20" height="3" rx="1.5" fill="#DBEAFE"/>
  <!-- Label -->
  <text x="200" y="262" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="bold" fill="#2563EB">Risk Management</text>
</svg>