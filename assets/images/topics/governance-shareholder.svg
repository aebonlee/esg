<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <rect width="400" height="300" rx="12" fill="#EFF6FF"/>
  <!-- Pie chart -->
  <circle cx="185" cy="130" r="70" fill="#DBEAFE"/>
  <!-- Pie slice 1 - large -->
  <path d="M185 130 L185 60 A70 70 0 0 1 248 100 Z" fill="#2563EB"/>
  <!-- Pie slice 2 - medium -->
  <path d="M185 130 L248 100 A70 70 0 0 1 235 185 Z" fill="#3B82F6"/>
  <!-- Pie slice 3 - small -->
  <path d="M185 130 L235 185 A70 70 0 0 1 185 200 Z" fill="#60A5FA"/>
  <!-- Pie slice 4 - remaining -->
  <path d="M185 130 L185 200 A70 70 0 0 1 185 60 Z" fill="#93C5FD"/>
  <!-- Center dot -->
  <circle cx="185" cy="130" r="5" fill="#EFF6FF"/>
  <!-- Person icon (shareholder) -->
  <circle cx="320" cy="100" r="22" fill="#2563EB"/>
  <circle cx="320" cy="92" r="9" fill="#EFF6FF"/>
  <path d="M305 112 Q320 122 335 112" stroke="#EFF6FF" stroke-width="2.5" fill="none"/>
  <!-- Connection line from person to chart -->
  <line x1="298" y1="108" x2="250" y2="118" stroke="#93C5FD" stroke-width="2" stroke-dasharray="4,4"/>
  <!-- Dollar/value symbols -->
  <text x="320" y="155" text-anchor="middle" font-family="sans-serif" font-size="22" font-weight="bold" fill="#3B82F6">$</text>
  <text x="340" y="175" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#93C5FD">%</text>
  <!-- Small arrow up -->
  <polygon points="310,175 320,160 330,175" fill="#60A5FA"/>
  <!-- Legend dots -->
  <circle cx="100" cy="225" r="5" fill="#2563EB"/>
  <circle cx="170" cy="225" r="5" fill="#3B82F6"/>
  <circle cx="240" cy="225" r="5" fill="#60A5FA"/>
  <circle cx="310" cy="225" r="5" fill="#93C5FD"/>
  <!-- Label -->
  <text x="200" y="268" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="bold" fill="#2563EB">Shareholder Rights</text>
</svg>