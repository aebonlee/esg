  <circle cx="160" cy="140" r="80" fill="#E11D48" opacity="0.2"/>
  <!-- Right circle - Society -->
  <circle cx="240" cy="140" r="80" fill="#E11D48" opacity="0.2"/>
  <!-- Overlap highlight -->
  <path d="M200 72 A80 80 0 0 1 200 208 A80 80 0 0 1 200 72Z" fill="#E11D48" opacity="0.25"/>
  <!-- Labels -->
  <text x="125" y="135" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#9F1239">Economy</text>
  <text x="125" y="153" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#BE123C">Growth</text>
  <text x="275" y="135" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#9F1239">Society</text>
  <text x="275" y="153" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#BE123C">Wellbeing</text>
  <!-- Center -->
  <text x="200" y="133" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#E11D48">Social</text>
  <text x="200" y="150" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#E11D48">Economy</text>
