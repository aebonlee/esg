<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <rect width="400" height="300" rx="12" fill="#FFFBEB"/>
  <!-- Pyramid with 4 layers -->
  <!-- Layer 4 (top) - Philanthropic -->
  <polygon points="200,45 245,105 155,105" fill="#D97706"/>
  <text x="200" y="90" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#FFFBEB">Philanthropic</text>
  <!-- Layer 3 - Ethical -->
  <polygon points="155,110 245,110 270,160 130,160" fill="#E8950A"/>
  <text x="200" y="142" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#FFFBEB">Ethical</text>
  <!-- Layer 2 - Legal -->
  <polygon points="130,165 270,165 295,215 105,215" fill="#F59E0B"/>
  <text x="200" y="197" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#FFFBEB">Legal</text>
  <!-- Layer 1 (base) - Economic -->
  <polygon points="105,220 295,220 320,270 80,270" fill="#FBBF24"/>
  <text x="200" y="252" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#78350F">Economic</text>
  <!-- Title -->
  <text x="200" y="30" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#D97706">Carroll's CSR Pyramid</text>
</svg>