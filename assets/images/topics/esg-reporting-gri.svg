<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <rect width="400" height="300" rx="12" fill="#ECFEFF"/>
  <!-- Document body -->
  <rect x="110" y="30" width="180" height="230" rx="10" fill="white" stroke="#0891B2" stroke-width="2.5"/>
  <!-- Document header -->
  <rect x="110" y="30" width="180" height="40" rx="10" fill="#0891B2"/>
  <rect x="110" y="55" width="180" height="15" fill="#0891B2"/>
  <text x="200" y="57" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="white">GRI Standards</text>
  <!-- Checklist items -->
  <!-- Item 1 - checked -->
  <rect x="135" y="90" width="18" height="18" rx="4" fill="#0891B2"/>
  <polyline points="139,100 143,105 151,95" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <rect x="163" y="94" width="100" height="8" rx="4" fill="#0891B2" opacity="0.3"/>
  <!-- Item 2 - checked -->
  <rect x="135" y="120" width="18" height="18" rx="4" fill="#0891B2"/>
  <polyline points="139,130 143,135 151,125" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <rect x="163" y="124" width="80" height="8" rx="4" fill="#0891B2" opacity="0.3"/>
  <!-- Item 3 - checked -->
  <rect x="135" y="150" width="18" height="18" rx="4" fill="#0891B2"/>
  <polyline points="139,160 143,165 151,155" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <rect x="163" y="154" width="110" height="8" rx="4" fill="#0891B2" opacity="0.3"/>
  <!-- Item 4 - unchecked -->
  <rect x="135" y="180" width="18" height="18" rx="4" fill="none" stroke="#0891B2" stroke-width="2"/>
  <rect x="163" y="184" width="90" height="8" rx="4" fill="#0891B2" opacity="0.2"/>
  <!-- Item 5 - unchecked -->
  <rect x="135" y="210" width="18" height="18" rx="4" fill="none" stroke="#0891B2" stroke-width="2"/>
  <rect x="163" y="214" width="70" height="8" rx="4" fill="#0891B2" opacity="0.2"/>
  <!-- Pencil icon -->
  <rect x="270" y="210" width="8" height="45" rx="2" fill="#0891B2" transform="rotate(-30 274 232)"/>
  <polygon points="258,252 254,266 268,262" fill="#0891B2"/>
  <!-- Label -->
  <text x="200" y="285" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#0891B2" opacity="0.6">GRI Checklist</text>
</svg>