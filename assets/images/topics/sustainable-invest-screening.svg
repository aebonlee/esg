<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <rect width="400" height="300" rx="12" fill="#FFFBEB"/>
  <!-- Funnel top (wide) -->
  <polygon points="110,60 290,60 250,140 150,140" fill="#F59E0B" opacity="0.8"/>
  <!-- Funnel middle -->
  <polygon points="150,140 250,140 230,190 170,190" fill="#F59E0B" opacity="0.9"/>
  <!-- Funnel bottom (narrow) -->
  <polygon points="170,190 230,190 215,240 185,240" fill="#F59E0B"/>
  <!-- Funnel spout -->
  <rect x="185" y="240" width="30" height="20" fill="#D97706"/>
  <!-- Input items (top - many) -->
  <circle cx="150" cy="45" r="8" fill="#F59E0B" opacity="0.3"/>
  <circle cx="175" cy="40" r="8" fill="#F59E0B" opacity="0.3"/>
  <circle cx="200" cy="42" r="8" fill="#F59E0B" opacity="0.3"/>
  <circle cx="225" cy="40" r="8" fill="#F59E0B" opacity="0.3"/>
  <circle cx="250" cy="45" r="8" fill="#F59E0B" opacity="0.3"/>
  <circle cx="163" cy="25" r="7" fill="#F59E0B" opacity="0.25"/>
  <circle cx="190" cy="22" r="7" fill="#F59E0B" opacity="0.25"/>
  <circle cx="215" cy="24" r="7" fill="#F59E0B" opacity="0.25"/>
  <circle cx="240" cy="27" r="7" fill="#F59E0B" opacity="0.25"/>
  <!-- Filter lines inside funnel -->
  <line x1="155" y1="100" x2="245" y2="100" stroke="white" stroke-width="1.5" opacity="0.5"/>
  <line x1="165" y1="140" x2="235" y2="140" stroke="white" stroke-width="1.5" opacity="0.5"/>
  <line x1="175" y1="175" x2="225" y2="175" stroke="white" stroke-width="1.5" opacity="0.5"/>
  <!-- Rejected items flying out -->
  <circle cx="90" cy="100" r="6" fill="#EF4444" opacity="0.4"/>
  <line x1="96" y1="96" x2="100" y2="92" stroke="#EF4444" stroke-width="1.5" opacity="0.4"/>
  <circle cx="310" cy="105" r="6" fill="#EF4444" opacity="0.4"/>
  <line x1="304" y1="101" x2="300" y2="97" stroke="#EF4444" stroke-width="1.5" opacity="0.4"/>
  <circle cx="85" cy="160" r="5" fill="#EF4444" opacity="0.3"/>
  <circle cx="315" cy="155" r="5" fill="#EF4444" opacity="0.3"/>
  <!-- Output (filtered - few golden items) -->
  <circle cx="195" cy="272" r="6" fill="#D97706"/>
  <circle cx="210" cy="275" r="6" fill="#D97706"/>
  <!-- Check mark on output -->
  <polyline points="188,272 194,278 204,265" stroke="#22C55E" stroke-width="2" stroke-linecap="round" fill="none"/>
  <!-- Labels on funnel stages -->
  <text x="330" y="80" font-family="sans-serif" font-size="9" fill="#F59E0B" opacity="0.7">All investments</text>
  <text x="325" y="155" font-family="sans-serif" font-size="9" fill="#F59E0B" opacity="0.7">ESG Screened</text>
  <text x="320" y="225" font-family="sans-serif" font-size="9" fill="#F59E0B" opacity="0.7">Selected</text>
  <!-- Label -->
  <text x="200" y="290" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#F59E0B" opacity="0.6">ESG Screening</text>
</svg>