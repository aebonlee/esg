<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <rect width="400" height="300" rx="12" fill="#EFF6FF"/>
  <!-- Eye shape outer -->
  <path d="M100 140 Q200 70 300 140 Q200 210 100 140 Z" fill="#DBEAFE" stroke="#2563EB" stroke-width="2.5"/>
  <!-- Eye iris -->
  <circle cx="200" cy="140" r="35" fill="#3B82F6"/>
  <!-- Eye pupil -->
  <circle cx="200" cy="140" r="18" fill="#1D4ED8"/>
  <!-- Eye highlight -->
  <circle cx="210" cy="132" r="7" fill="#93C5FD"/>
  <!-- Magnifying glass handle -->
  <line x1="248" y1="178" x2="300" y2="230" stroke="#2563EB" stroke-width="6" stroke-linecap="round"/>
  <!-- Magnifying glass ring -->
  <circle cx="235" cy="165" r="35" fill="none" stroke="#2563EB" stroke-width="4"/>
  <!-- Light rays from eye -->
  <line x1="310" y1="110" x2="340" y2="95" stroke="#93C5FD" stroke-width="2" stroke-linecap="round"/>
  <line x1="315" y1="140" x2="350" y2="140" stroke="#93C5FD" stroke-width="2" stroke-linecap="round"/>
  <line x1="310" y1="170" x2="340" y2="185" stroke="#93C5FD" stroke-width="2" stroke-linecap="round"/>
  <line x1="90" y1="110" x2="60" y2="95" stroke="#93C5FD" stroke-width="2" stroke-linecap="round"/>
  <line x1="85" y1="140" x2="50" y2="140" stroke="#93C5FD" stroke-width="2" stroke-linecap="round"/>
  <line x1="90" y1="170" x2="60" y2="185" stroke="#93C5FD" stroke-width="2" stroke-linecap="round"/>
  <!-- Label -->
  <text x="200" y="272" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="bold" fill="#2563EB">Transparency</text>
</svg>