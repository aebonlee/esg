<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" fill="none">
  <rect width="800" height="400" rx="12" fill="#ECFDF5"/>
  <!-- Sky area -->
  <rect width="800" height="280" rx="12" fill="#D1FAE5" opacity="0.4"/>
  <!-- Sun -->
  <circle cx="680" cy="80" r="45" fill="#FBBF24"/>
  <!-- Sun rays -->
  <line x1="680" y1="25" x2="680" y2="10" stroke="#FBBF24" stroke-width="3" stroke-linecap="round"/>
  <line x1="680" y1="135" x2="680" y2="150" stroke="#FBBF24" stroke-width="3" stroke-linecap="round"/>
  <line x1="625" y1="80" x2="610" y2="80" stroke="#FBBF24" stroke-width="3" stroke-linecap="round"/>
  <line x1="735" y1="80" x2="750" y2="80" stroke="#FBBF24" stroke-width="3" stroke-linecap="round"/>
  <line x1="648" y1="48" x2="637" y2="37" stroke="#FBBF24" stroke-width="3" stroke-linecap="round"/>
  <line x1="712" y1="48" x2="723" y2="37" stroke="#FBBF24" stroke-width="3" stroke-linecap="round"/>
  <line x1="648" y1="112" x2="637" y2="123" stroke="#FBBF24" stroke-width="3" stroke-linecap="round"/>
  <line x1="712" y1="112" x2="723" y2="123" stroke="#FBBF24" stroke-width="3" stroke-linecap="round"/>
  <!-- Hills / Ground -->
  <ellipse cx="200" cy="320" rx="300" ry="80" fill="#10B981" opacity="0.3"/>
  <ellipse cx="600" cy="330" rx="350" ry="90" fill="#10B981" opacity="0.25"/>
  <rect y="320" width="800" height="80" rx="0" fill="#10B981" opacity="0.2"/>
  <!-- Ground line -->
  <rect y="340" width="800" height="60" fill="#10B981" opacity="0.15"/>
  <!-- Wind Turbine 1 -->
  <rect x="148" y="160" width="6" height="180" fill="#6B7280"/>
  <!-- Turbine blades -->
  <line x1="151" y1="160" x2="151" y2="100" stroke="#374151" stroke-width="4" stroke-linecap="round"/>
  <line x1="151" y1="160" x2="100" y2="190" stroke="#374151" stroke-width="4" stroke-linecap="round"/>
  <line x1="151" y1="160" x2="200" y2="190" stroke="#374151" stroke-width="4" stroke-linecap="round"/>
  <circle cx="151" cy="160" r="5" fill="#374151"/>
  <!-- Wind Turbine 2 (smaller, background) -->
  <rect x="88" y="200" width="4" height="140" fill="#9CA3AF"/>
  <line x1="90" y1="200" x2="90" y2="155" stroke="#9CA3AF" stroke-width="3" stroke-linecap="round"/>
  <line x1="90" y1="200" x2="52" y2="222" stroke="#9CA3AF" stroke-width="3" stroke-linecap="round"/>
  <line x1="90" y1="200" x2="128" y2="222" stroke="#9CA3AF" stroke-width="3" stroke-linecap="round"/>
  <circle cx="90" cy="200" r="4" fill="#9CA3AF"/>
  <!-- Large Leaf -->
  <path d="M400,300 Q380,220 420,160 Q460,220 440,300 Z" fill="#10B981" opacity="0.8"/>
  <line x1="420" y1="165" x2="420" y2="310" stroke="#059669" stroke-width="2"/>
  <!-- Leaf veins -->
  <line x1="420" y1="200" x2="400" y2="220" stroke="#059669" stroke-width="1" opacity="0.5"/>
  <line x1="420" y1="220" x2="438" y2="240" stroke="#059669" stroke-width="1" opacity="0.5"/>
  <line x1="420" y1="240" x2="404" y2="260" stroke="#059669" stroke-width="1" opacity="0.5"/>
  <line x1="420" y1="260" x2="436" y2="278" stroke="#059669" stroke-width="1" opacity="0.5"/>
  <!-- Small leaf 2 -->
  <path d="M340,320 Q330,280 350,260 Q370,280 360,320 Z" fill="#34D399" opacity="0.6"/>
  <line x1="350" y1="262" x2="350" y2="330" stroke="#10B981" stroke-width="1.5"/>
  <!-- Clouds -->
  <circle cx="300" cy="70" r="25" fill="#FFFFFF" opacity="0.7"/>
  <circle cx="325" cy="60" r="30" fill="#FFFFFF" opacity="0.7"/>
  <circle cx="355" cy="70" r="22" fill="#FFFFFF" opacity="0.7"/>
  <circle cx="500" cy="50" r="20" fill="#FFFFFF" opacity="0.5"/>
  <circle cx="522" cy="42" r="25" fill="#FFFFFF" opacity="0.5"/>
  <circle cx="548" cy="50" r="18" fill="#FFFFFF" opacity="0.5"/>
  <!-- Solar Panels -->
  <polygon points="540,280 580,260 620,280 580,300" fill="#1E40AF" opacity="0.7"/>
  <line x1="560" y1="270" x2="600" y2="290" stroke="#FFFFFF" stroke-width="0.5" opacity="0.5"/>
  <line x1="580" y1="260" x2="580" y2="300" stroke="#FFFFFF" stroke-width="0.5" opacity="0.5"/>
  <polygon points="560,295 600,275 640,295 600,315" fill="#1E40AF" opacity="0.6"/>
  <line x1="580" y1="285" x2="620" y2="305" stroke="#FFFFFF" stroke-width="0.5" opacity="0.5"/>
  <line x1="600" y1="275" x2="600" y2="315" stroke="#FFFFFF" stroke-width="0.5" opacity="0.5"/>
  <!-- Title text -->
  <text x="400" y="380" font-family="sans-serif" font-size="18" font-weight="bold" fill="#059669" text-anchor="middle">Environmental Sustainability</text>
</svg>