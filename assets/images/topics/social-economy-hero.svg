  <!-- Soil mound -->
  <ellipse cx="400" cy="300" rx="60" ry="15" fill="#92400E" opacity="0.4"/>
  <!-- Community people - left group -->
  <!-- Person 1 -->
  <circle cx="180" cy="240" r="18" fill="#E11D48"/>
  <rect x="168" y="262" width="24" height="40" rx="8" fill="#E11D48"/>
