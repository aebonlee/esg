  <path d="M230 260 Q320 220 395 270" stroke="#E11D48" stroke-width="2" opacity="0.25" fill="none"/>
  <path d="M570 260 Q480 220 405 270" stroke="#E11D48" stroke-width="2" opacity="0.25" fill="none"/>
  <!-- Small hearts -->
  <path d="M340 140 C340 136 335 132 331 134 C327 136 327 141 331 145 L340 152 L349 145 C353 141 353 136 349 134 C345 132 340 136 340 140Z" fill="#E11D48" opacity="0.4"/>
  <path d="M460 130 C460 126 455 122 451 124 C447 126 447 131 451 135 L460 142 L469 135 C473 131 473 126 469 124 C465 122 460 126 460 130Z" fill="#E11D48" opacity="0.35"/>
