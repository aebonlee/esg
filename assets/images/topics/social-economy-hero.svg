  <ellipse cx="375" cy="155" rx="25" ry="12" transform="rotate(-20 375 155)" fill="#10B981"/>
  <ellipse cx="425" cy="140" rx="27" ry="13" transform="rotate(30 425 140)" fill="#059669"/>
