  <rect x="521" y="269" width="18" height="32" rx="6" fill="#E11D48" opacity="0.7"/>
  <!-- Person 5 -->
  <circle cx="570" cy="245" r="16" fill="#FB7185"/>
  <rect x="560" y="265" width="20" height="36" rx="7" fill="#FB7185"/>
  <!-- Person 6 -->
  <circle cx="620" cy="240" r="18" fill="#E11D48"/>
