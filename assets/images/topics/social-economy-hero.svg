  <circle cx="680" cy="80" r="35" fill="#FBBF24" opacity="0.5"/>
  <circle cx="680" cy="80" r="25" fill="#FBBF24" opacity="0.7"/>
  <!-- Title -->
  <text x="400" y="365" text-anchor="middle" font-family="sans-serif" font-size="28" font-weight="bold" fill="#E11D48">Social Economy</text>
