<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <rect width="400" height="300" rx="12" fill="#ECFEFF"/>
  <!-- Cloud -->
  <circle cx="180" cy="90" r="40" fill="white" stroke="#0891B2" stroke-width="2"/>
  <circle cx="220" cy="80" r="35" fill="white" stroke="#0891B2" stroke-width="2"/>
  <circle cx="250" cy="95" r="30" fill="white" stroke="#0891B2" stroke-width="2"/>
  <rect x="175" y="90" width="80" height="35" fill="white"/>
  <circle cx="200" cy="100" r="28" fill="white"/>
  <!-- Sun behind cloud -->
  <circle cx="270" cy="65" r="25" fill="#F59E0B" opacity="0.8"/>
  <!-- Sun rays -->
  <line x1="270" y1="32" x2="270" y2="22" stroke="#F59E0B" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
  <line x1="295" y1="42" x2="302" y2="35" stroke="#F59E0B" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
  <line x1="303" y1="65" x2="313" y2="65" stroke="#F59E0B" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
  <line x1="295" y1="88" x2="302" y2="95" stroke="#F59E0B" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
  <!-- Temperature/climate chart -->
  <rect x="100" y="150" width="200" height="110" rx="8" fill="white" stroke="#0891B2" stroke-width="2"/>
  <!-- Chart axes -->
  <line x1="125" y1="240" x2="280" y2="240" stroke="#0891B2" stroke-width="1.5"/>
  <line x1="125" y1="170" x2="125" y2="240" stroke="#0891B2" stroke-width="1.5"/>
  <!-- Rising temperature line -->
  <polyline points="135,230 160,225 185,218 210,210 235,195 260,175" stroke="#EF4444" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Data dots -->
  <circle cx="135" cy="230" r="3" fill="#EF4444"/>
  <circle cx="160" cy="225" r="3" fill="#EF4444"/>
  <circle cx="185" cy="218" r="3" fill="#EF4444"/>
  <circle cx="210" cy="210" r="3" fill="#EF4444"/>
  <circle cx="235" cy="195" r="3" fill="#EF4444"/>
  <circle cx="260" cy="175" r="3" fill="#EF4444"/>
  <!-- Chart title -->
  <text x="200" y="165" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="bold" fill="#0891B2">Climate Risk</text>
  <!-- Thermometer icon -->
  <rect x="320" y="140" width="14" height="70" rx="7" fill="white" stroke="#0891B2" stroke-width="2"/>
  <circle cx="327" cy="225" r="16" fill="white" stroke="#0891B2" stroke-width="2"/>
  <rect x="323" y="165" width="8" height="50" rx="2" fill="#EF4444" opacity="0.7"/>
  <circle cx="327" cy="225" r="11" fill="#EF4444" opacity="0.7"/>
  <!-- Label -->
  <text x="200" y="285" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#0891B2" opacity="0.6">TCFD Climate Disclosure</text>
</svg>