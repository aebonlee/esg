<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <rect width="400" height="300" rx="12" fill="#ECFEFF"/>
  <!-- Building base -->
  <rect x="140" y="100" width="120" height="150" rx="4" fill="#0891B2"/>
  <!-- Building windows -->
  <rect x="155" y="115" width="22" height="22" rx="3" fill="#ECFEFF"/>
  <rect x="189" y="115" width="22" height="22" rx="3" fill="#ECFEFF"/>
  <rect x="223" y="115" width="22" height="22" rx="3" fill="#ECFEFF"/>
  <rect x="155" y="150" width="22" height="22" rx="3" fill="#ECFEFF"/>
  <rect x="189" y="150" width="22" height="22" rx="3" fill="#ECFEFF"/>
  <rect x="223" y="150" width="22" height="22" rx="3" fill="#ECFEFF"/>
  <rect x="155" y="185" width="22" height="22" rx="3" fill="#ECFEFF"/>
  <rect x="189" y="185" width="22" height="22" rx="3" fill="#ECFEFF"/>
  <rect x="223" y="185" width="22" height="22" rx="3" fill="#ECFEFF"/>
  <!-- Building door -->
  <rect x="185" y="220" width="30" height="30" rx="3" fill="#ECFEFF"/>
  <!-- Building roof/pediment -->
  <polygon points="130,100 200,60 270,100" fill="#065F6B"/>
  <!-- Standards badge -->
  <circle cx="310" cy="100" r="40" fill="white" stroke="#0891B2" stroke-width="3"/>
  <text x="310" y="95" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#0891B2">SASB</text>
  <text x="310" y="112" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#0891B2">Standards</text>
  <!-- Standards lines from badge -->
  <line x1="310" y1="140" x2="310" y2="170" stroke="#0891B2" stroke-width="2" stroke-dasharray="4,3"/>
  <!-- Industry label tags -->
  <rect x="280" y="175" width="70" height="22" rx="6" fill="#0891B2" opacity="0.8"/>
  <text x="315" y="190" text-anchor="middle" font-family="sans-serif" font-size="9" fill="white">Industry A</text>
  <rect x="280" y="205" width="70" height="22" rx="6" fill="#0891B2" opacity="0.6"/>
  <text x="315" y="220" text-anchor="middle" font-family="sans-serif" font-size="9" fill="white">Industry B</text>
  <rect x="280" y="235" width="70" height="22" rx="6" fill="#0891B2" opacity="0.4"/>
  <text x="315" y="250" text-anchor="middle" font-family="sans-serif" font-size="9" fill="white">Industry C</text>
  <!-- Ground line -->
  <line x1="80" y1="250" x2="370" y2="250" stroke="#0891B2" stroke-width="2" opacity="0.3"/>
  <!-- Label -->
  <text x="200" y="280" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#0891B2" opacity="0.6">Industry-Specific Standards</text>
</svg>