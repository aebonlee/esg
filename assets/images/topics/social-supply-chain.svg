<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <rect width="400" height="300" rx="12" fill="#F5F3FF"/>
  <!-- Chain link 1 -->
  <rect x="55" y="110" width="60" height="80" rx="20" fill="none" stroke="#8B5CF6" stroke-width="5"/>
  <!-- Chain link 2 (interlocked) -->
  <rect x="95" y="110" width="60" height="80" rx="20" fill="none" stroke="#A78BFA" stroke-width="5"/>
  <!-- Overlap cover for interlock effect link 1-2 -->
  <rect x="113" y="105" width="4" height="18" fill="#F5F3FF"/>
  <rect x="95" y="177" width="18" height="18" fill="#F5F3FF"/>
  <rect x="95" y="183" width="4" height="12" fill="#A78BFA"/>
  <!-- Chain link 3 -->
  <rect x="135" y="110" width="60" height="80" rx="20" fill="none" stroke="#7C3AED" stroke-width="5"/>
  <!-- Overlap cover for interlock effect link 2-3 -->
  <rect x="153" y="105" width="4" height="18" fill="#F5F3FF"/>
  <rect x="135" y="177" width="18" height="18" fill="#F5F3FF"/>
  <rect x="135" y="183" width="4" height="12" fill="#7C3AED"/>
  <!-- Chain link 4 -->
  <rect x="175" y="110" width="60" height="80" rx="20" fill="none" stroke="#8B5CF6" stroke-width="5"/>
  <rect x="193" y="105" width="4" height="18" fill="#F5F3FF"/>
  <rect x="175" y="177" width="18" height="18" fill="#F5F3FF"/>
  <rect x="175" y="183" width="4" height="12" fill="#8B5CF6"/>
  <!-- Chain link 5 -->
  <rect x="215" y="110" width="60" height="80" rx="20" fill="none" stroke="#A78BFA" stroke-width="5"/>
  <rect x="233" y="105" width="4" height="18" fill="#F5F3FF"/>
  <rect x="215" y="177" width="18" height="18" fill="#F5F3FF"/>
  <rect x="215" y="183" width="4" height="12" fill="#A78BFA"/>
  <!-- Chain link 6 -->
  <rect x="255" y="110" width="60" height="80" rx="20" fill="none" stroke="#C4B5FD" stroke-width="5"/>
  <rect x="273" y="105" width="4" height="18" fill="#F5F3FF"/>
  <rect x="255" y="177" width="18" height="18" fill="#F5F3FF"/>
  <rect x="255" y="183" width="4" height="12" fill="#C4B5FD"/>
  <!-- Arrow indicators -->
  <polygon points="330,150 350,140 350,160" fill="#8B5CF6"/>
  <polygon points="70,150 50,140 50,160" fill="#8B5CF6"/>
  <!-- Small decorative dots -->
  <circle cx="80" cy="70" r="4" fill="#DDD6FE"/>
  <circle cx="200" cy="60" r="5" fill="#EDE9FE"/>
  <circle cx="320" cy="70" r="4" fill="#DDD6FE"/>
  <!-- Label -->
  <text x="200" y="260" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="bold" fill="#8B5CF6">Supply Chain</text>
</svg>