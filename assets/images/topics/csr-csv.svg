<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <rect width="400" height="300" rx="12" fill="#FFFBEB"/>
  <!-- Left circle - Business -->
  <circle cx="165" cy="150" r="85" fill="#D97706" opacity="0.25"/>
  <!-- Right circle - Society -->
  <circle cx="235" cy="150" r="85" fill="#D97706" opacity="0.25"/>
  <!-- Overlap area highlight -->
  <path d="M200 80 A85 85 0 0 1 200 220 A85 85 0 0 1 200 80Z" fill="#D97706" opacity="0.35"/>
  <!-- Labels -->
  <text x="130" y="145" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#78350F">Business</text>
  <text x="130" y="163" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#92400E">Profit</text>
  <text x="270" y="145" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#78350F">Society</text>
  <text x="270" y="163" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#92400E">Impact</text>
  <!-- Center overlap label -->
  <text x="200" y="145" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="bold" fill="#D97706">CSV</text>
  <text x="200" y="163" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#92400E">Shared Value</text>
  <!-- Title -->
  <text x="200" y="275" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#D97706">Creating Shared Value</text>
</svg>