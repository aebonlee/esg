<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <rect width="400" height="300" rx="12" fill="#FFF1F2"/>
  <!-- Network web diagram -->
  <!-- Central node -->
  <circle cx="200" cy="140" r="28" fill="#E11D48"/>
  <text x="200" y="137" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="bold" fill="#FFF1F2">Social</text>
  <text x="200" y="149" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="bold" fill="#FFF1F2">Ecosystem</text>
  <!-- Node positions and connections -->
  <!-- Node 1 (top) -->
  <line x1="200" y1="112" x2="200" y2="58" stroke="#E11D48" stroke-width="2" opacity="0.3"/>
  <circle cx="200" cy="45" r="20" fill="#FB7185"/>
  <text x="200" y="48" text-anchor="middle" font-family="sans-serif" font-size="9" font-weight="bold" fill="#FFF1F2">Gov</text>
  <!-- Node 2 (top-right) -->
  <line x1="224" y1="120" x2="290" y2="72" stroke="#E11D48" stroke-width="2" opacity="0.3"/>
  <circle cx="300" cy="65" r="20" fill="#FB7185"/>
  <text x="300" y="68" text-anchor="middle" font-family="sans-serif" font-size="9" font-weight="bold" fill="#FFF1F2">Finance</text>
  <!-- Node 3 (right) -->
  <line x1="228" y1="140" x2="305" y2="145" stroke="#E11D48" stroke-width="2" opacity="0.3"/>
  <circle cx="320" cy="147" r="20" fill="#FB7185"/>
  <text x="320" y="150" text-anchor="middle" font-family="sans-serif" font-size="9" font-weight="bold" fill="#FFF1F2">Market</text>
  <!-- Node 4 (bottom-right) -->
  <line x1="220" y1="162" x2="280" y2="215" stroke="#E11D48" stroke-width="2" opacity="0.3"/>
  <circle cx="290" cy="225" r="20" fill="#FB7185"/>
  <text x="290" y="228" text-anchor="middle" font-family="sans-serif" font-size="9" font-weight="bold" fill="#FFF1F2">NGO</text>
  <!-- Node 5 (bottom) -->
  <line x1="200" y1="168" x2="200" y2="218" stroke="#E11D48" stroke-width="2" opacity="0.3"/>
  <circle cx="200" cy="232" r="20" fill="#FB7185"/>
  <text x="200" y="235" text-anchor="middle" font-family="sans-serif" font-size="9" font-weight="bold" fill="#FFF1F2">Citizen</text>
  <!-- Node 6 (bottom-left) -->
  <line x1="180" y1="162" x2="120" y2="215" stroke="#E11D48" stroke-width="2" opacity="0.3"/>
  <circle cx="110" cy="225" r="20" fill="#FB7185"/>
  <text x="110" y="228" text-anchor="middle" font-family="sans-serif" font-size="9" font-weight="bold" fill="#FFF1F2">Edu</text>
  <!-- Node 7 (left) -->
  <line x1="172" y1="140" x2="95" y2="145" stroke="#E11D48" stroke-width="2" opacity="0.3"/>
  <circle cx="80" cy="147" r="20" fill="#FB7185"/>
  <text x="80" y="150" text-anchor="middle" font-family="sans-serif" font-size="9" font-weight="bold" fill="#FFF1F2">Media</text>
  <!-- Node 8 (top-left) -->
  <line x1="176" y1="120" x2="110" y2="72" stroke="#E11D48" stroke-width="2" opacity="0.3"/>
  <circle cx="100" cy="65" r="20" fill="#FB7185"/>
  <text x="100" y="68" text-anchor="middle" font-family="sans-serif" font-size="9" font-weight="bold" fill="#FFF1F2">Corp</text>
  <!-- Cross-connections (web effect) -->
  <line x1="200" y1="45" x2="300" y2="65" stroke="#E11D48" stroke-width="1" opacity="0.15"/>
  <line x1="300" y1="65" x2="320" y2="147" stroke="#E11D48" stroke-width="1" opacity="0.15"/>
  <line x1="320" y1="147" x2="290" y2="225" stroke="#E11D48" stroke-width="1" opacity="0.15"/>
  <line x1="290" y1="225" x2="200" y2="232" stroke="#E11D48" stroke-width="1" opacity="0.15"/>
  <line x1="200" y1="232" x2="110" y2="225" stroke="#E11D48" stroke-width="1" opacity="0.15"/>
  <line x1="110" y1="225" x2="80" y2="147" stroke="#E11D48" stroke-width="1" opacity="0.15"/>
  <line x1="80" y1="147" x2="100" y2="65" stroke="#E11D48" stroke-width="1" opacity="0.15"/>
  <line x1="100" y1="65" x2="200" y2="45" stroke="#E11D48" stroke-width="1" opacity="0.15"/>
  <!-- Diagonal cross-connections -->
  <line x1="100" y1="65" x2="320" y2="147" stroke="#E11D48" stroke-width="1" opacity="0.08"/>
  <line x1="200" y1="45" x2="200" y2="232" stroke="#E11D48" stroke-width="1" opacity="0.08"/>
  <line x1="80" y1="147" x2="290" y2="225" stroke="#E11D48" stroke-width="1" opacity="0.08"/>
  <line x1="110" y1="225" x2="300" y2="65" stroke="#E11D48" stroke-width="1" opacity="0.08"/>
  <!-- Title -->
  <text x="200" y="283" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="bold" fill="#E11D48">Social Economy Ecosystem</text>
</svg>