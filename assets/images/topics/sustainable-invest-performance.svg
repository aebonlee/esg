<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <rect width="400" height="300" rx="12" fill="#FFFBEB"/>
  <!-- Chart area -->
  <rect x="50" y="30" width="300" height="220" rx="8" fill="white" stroke="#F59E0B" stroke-width="1.5"/>
  <!-- Grid lines -->
  <line x1="80" y1="70" x2="330" y2="70" stroke="#F59E0B" stroke-width="0.5" opacity="0.15"/>
  <line x1="80" y1="110" x2="330" y2="110" stroke="#F59E0B" stroke-width="0.5" opacity="0.15"/>
  <line x1="80" y1="150" x2="330" y2="150" stroke="#F59E0B" stroke-width="0.5" opacity="0.15"/>
  <line x1="80" y1="190" x2="330" y2="190" stroke="#F59E0B" stroke-width="0.5" opacity="0.15"/>
  <!-- Y-axis -->
  <line x1="80" y1="50" x2="80" y2="230" stroke="#F59E0B" stroke-width="1.5" opacity="0.5"/>
  <!-- X-axis -->
  <line x1="80" y1="230" x2="330" y2="230" stroke="#F59E0B" stroke-width="1.5" opacity="0.5"/>
  <!-- Y-axis labels -->
  <text x="70" y="74" text-anchor="end" font-family="sans-serif" font-size="8" fill="#F59E0B" opacity="0.5">40%</text>
  <text x="70" y="114" text-anchor="end" font-family="sans-serif" font-size="8" fill="#F59E0B" opacity="0.5">30%</text>
  <text x="70" y="154" text-anchor="end" font-family="sans-serif" font-size="8" fill="#F59E0B" opacity="0.5">20%</text>
  <text x="70" y="194" text-anchor="end" font-family="sans-serif" font-size="8" fill="#F59E0B" opacity="0.5">10%</text>
  <text x="70" y="234" text-anchor="end" font-family="sans-serif" font-size="8" fill="#F59E0B" opacity="0.5">0%</text>
  <!-- Main performance line (going up) -->
  <polyline points="90,210 120,200 150,185 175,190 200,170 220,155 245,130 270,120 295,95 320,70" stroke="#F59E0B" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Area fill under line -->
  <polygon points="90,210 120,200 150,185 175,190 200,170 220,155 245,130 270,120 295,95 320,70 320,230 90,230" fill="#F59E0B" opacity="0.1"/>
  <!-- Data points -->
  <circle cx="90" cy="210" r="4" fill="#F59E0B"/>
  <circle cx="150" cy="185" r="4" fill="#F59E0B"/>
  <circle cx="200" cy="170" r="4" fill="#F59E0B"/>
  <circle cx="245" cy="130" r="4" fill="#F59E0B"/>
  <circle cx="295" cy="95" r="4" fill="#F59E0B"/>
  <circle cx="320" cy="70" r="4" fill="#F59E0B"/>
  <!-- Benchmark line (flatter) -->
  <polyline points="90,215 120,210 150,200 175,205 200,195 220,190 245,180 270,175 295,168 320,155" stroke="#D97706" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none" stroke-dasharray="6,4" opacity="0.6"/>
  <!-- Arrow pointing up at the end -->
  <polygon points="320,70 312,82 320,78 328,82" fill="#F59E0B"/>
  <!-- Legend -->
  <line x1="100" y1="260" x2="125" y2="260" stroke="#F59E0B" stroke-width="2.5"/>
  <text x="130" y="263" font-family="sans-serif" font-size="9" fill="#F59E0B">ESG Fund</text>
  <line x1="210" y1="260" x2="235" y2="260" stroke="#D97706" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.6"/>
  <text x="240" y="263" font-family="sans-serif" font-size="9" fill="#D97706" opacity="0.6">Benchmark</text>
  <!-- Label -->
  <text x="200" y="290" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#F59E0B" opacity="0.6">Investment Performance</text>
</svg>