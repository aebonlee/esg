<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <rect width="400" height="300" rx="12" fill="#ECFDF5"/>
  <!-- Title -->
  <text x="200" y="30" font-family="sans-serif" font-size="14" font-weight="bold" fill="#374151" text-anchor="middle">Biodiversity</text>
  <!-- Ground -->
  <rect x="0" y="250" width="400" height="50" rx="0" fill="#10B981" opacity="0.15"/>
  <ellipse cx="200" cy="250" rx="200" ry="15" fill="#10B981" opacity="0.2"/>
  <!-- Tree trunk -->
  <rect x="188" y="140" width="24" height="110" rx="4" fill="#92400E"/>
  <!-- Tree canopy -->
  <circle cx="200" cy="110" r="55" fill="#10B981"/>
  <circle cx="165" cy="130" r="35" fill="#059669"/>
  <circle cx="235" cy="130" r="35" fill="#059669"/>
  <circle cx="200" cy="80" r="40" fill="#34D399"/>
  <circle cx="175" cy="100" r="30" fill="#10B981"/>
  <circle cx="225" cy="100" r="30" fill="#10B981"/>
  <!-- Tree branches -->
  <line x1="195" y1="160" x2="165" y2="140" stroke="#92400E" stroke-width="3" stroke-linecap="round"/>
  <line x1="205" y1="160" x2="235" y2="140" stroke="#92400E" stroke-width="3" stroke-linecap="round"/>
  <!-- Bird 1 (flying, right side) -->
  <path d="M300,80 Q310,70 315,80 Q320,70 330,80" stroke="#374151" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Bird 2 (flying, upper right) -->
  <path d="M320,60 Q327,52 331,60 Q335,52 342,60" stroke="#374151" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- Bird 3 (flying, left side) -->
  <path d="M70,90 Q77,82 81,90 Q85,82 92,90" stroke="#374151" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- Bird on tree -->
  <ellipse cx="250" cy="115" rx="8" ry="6" fill="#F59E0B"/>
  <circle cx="256" cy="112" r="3" fill="#F59E0B"/>
  <polygon points="260,111 266,112 260,113" fill="#EF4444"/>
  <circle cx="257" cy="111" r="1" fill="#374151"/>
  <!-- Rabbit (bottom left) -->
  <ellipse cx="80" cy="242" rx="12" ry="10" fill="#D1D5DB"/>
  <circle cx="80" cy="230" r="8" fill="#D1D5DB"/>
  <ellipse cx="76" cy="218" rx="3" ry="8" fill="#D1D5DB"/>
  <ellipse cx="84" cy="218" rx="3" ry="8" fill="#D1D5DB"/>
  <circle cx="77" cy="228" r="1.5" fill="#374151"/>
  <circle cx="83" cy="228" r="1.5" fill="#374151"/>
  <ellipse cx="80" cy="232" rx="2" ry="1.5" fill="#F9A8D4"/>
  <!-- Deer (bottom right) -->
  <ellipse cx="330" cy="235" rx="18" ry="12" fill="#D97706"/>
  <circle cx="345" cy="222" r="8" fill="#D97706"/>
  <!-- Deer legs -->
  <line x1="320" y1="245" x2="320" y2="258" stroke="#92400E" stroke-width="2" stroke-linecap="round"/>
  <line x1="328" y1="246" x2="328" y2="258" stroke="#92400E" stroke-width="2" stroke-linecap="round"/>
  <line x1="335" y1="246" x2="335" y2="258" stroke="#92400E" stroke-width="2" stroke-linecap="round"/>
  <line x1="342" y1="244" x2="342" y2="258" stroke="#92400E" stroke-width="2" stroke-linecap="round"/>
  <!-- Deer antlers -->
  <line x1="342" y1="215" x2="338" y2="200" stroke="#92400E" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="338" y1="205" x2="333" y2="198" stroke="#92400E" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="348" y1="215" x2="352" y2="200" stroke="#92400E" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="352" y1="205" x2="357" y2="198" stroke="#92400E" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="343" cy="221" r="1.5" fill="#374151"/>
  <!-- Small flowers -->
  <circle cx="120" cy="245" r="4" fill="#F472B6"/>
  <circle cx="120" cy="245" r="1.5" fill="#FBBF24"/>
  <circle cx="290" cy="248" r="4" fill="#A78BFA"/>
  <circle cx="290" cy="248" r="1.5" fill="#FBBF24"/>
  <circle cx="155" cy="252" r="3" fill="#FB923C"/>
  <circle cx="155" cy="252" r="1" fill="#FBBF24"/>
  <!-- Grass tufts -->
  <path d="M50,250 L55,235 L60,250" stroke="#10B981" stroke-width="1.5" fill="none"/>
  <path d="M260,250 L265,237 L270,250" stroke="#10B981" stroke-width="1.5" fill="none"/>
  <path d="M370,250 L375,238 L380,250" stroke="#10B981" stroke-width="1.5" fill="none"/>
  <!-- Bottom label -->
  <text x="200" y="280" font-family="sans-serif" font-size="11" fill="#6B7280" text-anchor="middle">Protecting Ecosystem Diversity</text>
</svg>