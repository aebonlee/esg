<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <rect width="400" height="300" rx="12" fill="#EFF6FF"/>
  <!-- Scale pillar -->
  <rect x="195" y="100" width="10" height="100" rx="3" fill="#2563EB"/>
  <rect x="185" y="195" width="30" height="10" rx="3" fill="#1D4ED8"/>
  <rect x="178" y="200" width="44" height="8" rx="3" fill="#2563EB"/>
  <!-- Balance beam -->
  <line x1="120" y1="115" x2="280" y2="115" stroke="#2563EB" stroke-width="4" stroke-linecap="round"/>
  <!-- Fulcrum -->
  <polygon points="190,100 210,100 200,88" fill="#1D4ED8"/>
  <!-- Left pan chains -->
  <line x1="120" y1="115" x2="100" y2="155" stroke="#3B82F6" stroke-width="2"/>
  <line x1="120" y1="115" x2="140" y2="155" stroke="#3B82F6" stroke-width="2"/>
  <!-- Left pan -->
  <path d="M92 155 Q120 175 148 155" stroke="#3B82F6" stroke-width="3" fill="#DBEAFE"/>
  <!-- Right pan chains -->
  <line x1="280" y1="115" x2="260" y2="155" stroke="#3B82F6" stroke-width="2"/>
  <line x1="280" y1="115" x2="300" y2="155" stroke="#3B82F6" stroke-width="2"/>
  <!-- Right pan -->
  <path d="M252 155 Q280 175 308 155" stroke="#3B82F6" stroke-width="3" fill="#DBEAFE"/>
  <!-- Items on pans -->
  <circle cx="120" cy="148" r="8" fill="#60A5FA"/>
  <circle cx="280" cy="148" r="8" fill="#60A5FA"/>
  <!-- Decorative stars -->
  <circle cx="90" cy="80" r="4" fill="#BFDBFE"/>
  <circle cx="310" cy="80" r="4" fill="#BFDBFE"/>
  <circle cx="60" cy="140" r="3" fill="#DBEAFE"/>
  <circle cx="340" cy="140" r="3" fill="#DBEAFE"/>
  <!-- Label -->
  <text x="200" y="260" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="bold" fill="#2563EB">Business Ethics</text>
</svg>