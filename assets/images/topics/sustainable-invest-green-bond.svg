<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <rect width="400" height="300" rx="12" fill="#FFFBEB"/>
  <!-- Bond certificate -->
  <rect x="80" y="50" width="240" height="170" rx="8" fill="white" stroke="#F59E0B" stroke-width="2.5"/>
  <!-- Certificate inner border -->
  <rect x="92" y="62" width="216" height="146" rx="4" fill="none" stroke="#F59E0B" stroke-width="1" stroke-dasharray="6,3" opacity="0.5"/>
  <!-- Certificate title -->
  <text x="200" y="90" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#F59E0B">GREEN BOND</text>
  <!-- Decorative line under title -->
  <line x1="145" y1="97" x2="255" y2="97" stroke="#F59E0B" stroke-width="1.5" opacity="0.4"/>
  <!-- Certificate text lines -->
  <rect x="120" y="110" width="160" height="6" rx="3" fill="#F59E0B" opacity="0.25"/>
  <rect x="130" y="124" width="140" height="6" rx="3" fill="#F59E0B" opacity="0.2"/>
  <rect x="125" y="138" width="150" height="6" rx="3" fill="#F59E0B" opacity="0.25"/>
  <!-- Dollar amount -->
  <text x="200" y="170" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="bold" fill="#D97706">$1,000,000</text>
  <!-- Certificate serial -->
  <text x="200" y="200" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#F59E0B" opacity="0.5">Certificate No. GB-2026-001</text>
  <!-- Leaf overlapping certificate -->
  <ellipse cx="310" cy="75" rx="28" ry="42" fill="#22C55E" opacity="0.75" transform="rotate(35 310 75)"/>
  <line x1="295" y1="95" x2="320" y2="60" stroke="white" stroke-width="1.5" opacity="0.5"/>
  <!-- Leaf veins -->
  <line x1="303" y1="85" x2="312" y2="68" stroke="white" stroke-width="0.8" opacity="0.4"/>
  <line x1="308" y1="90" x2="320" y2="75" stroke="white" stroke-width="0.8" opacity="0.4"/>
  <!-- Small leaf 2 -->
  <ellipse cx="100" cy="210" rx="18" ry="28" fill="#22C55E" opacity="0.5" transform="rotate(-25 100 210)"/>
  <line x1="93" y1="230" x2="105" y2="195" stroke="white" stroke-width="1" opacity="0.4"/>
  <!-- Corner decorations on certificate -->
  <rect x="83" y="53" width="15" height="2" fill="#F59E0B" opacity="0.5"/>
  <rect x="83" y="53" width="2" height="15" fill="#F59E0B" opacity="0.5"/>
  <rect x="302" y="53" width="15" height="2" fill="#F59E0B" opacity="0.5"/>
  <rect x="315" y="53" width="2" height="15" fill="#F59E0B" opacity="0.5"/>
  <rect x="83" y="215" width="15" height="2" fill="#F59E0B" opacity="0.5"/>
  <rect x="83" y="203" width="2" height="15" fill="#F59E0B" opacity="0.5"/>
  <rect x="302" y="215" width="15" height="2" fill="#F59E0B" opacity="0.5"/>
  <rect x="315" y="203" width="2" height="15" fill="#F59E0B" opacity="0.5"/>
  <!-- Label -->
  <text x="200" y="265" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#F59E0B" opacity="0.6">Green Bond Certificate</text>
</svg>